name: smart-inventory-optimization
version: "1.0.0"
description: "A production-grade OpenEnv environment simulating real-world inventory management for training AI agents."
author: "nikhilgonugunta"
license: "MIT"

environment:
  entry_point: "server:app"
  host: "0.0.0.0"
  port: 7860

tasks:
  - id: task1_easy
    name: "Deterministic Inventory Control"
    difficulty: easy
    episode_length: 30

  - id: task2_medium
    name: "Stochastic Demand with Variable Lead Times"
    difficulty: medium
    episode_length: 45

  - id: task3_hard
    name: "Seasonal Demand with Unreliable Suppliers"
    difficulty: hard
    episode_length: 60

  - id: task4_extreme
    name: "Market Chaos Supply Chain Disruption"
    difficulty: extreme
    episode_length: 90
